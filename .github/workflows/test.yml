name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Run tests
        run: uv run pytest --flakiness-project="flakiness/pytest-flakiness"

      - name: Upload Flakiness report artifact (for Pull Requests from forks)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-report-${{ github.job }}-${{ strategy.job-index }}
          path: flakiness-report/
          retention-days: 1
